<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打地鼠小遊戲</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="topbar">
      <h1>打地鼠</h1>
      <p class="subtitle">在時間內盡量打到更多地鼠</p>
    </header>

    <section class="hud" aria-label="遊戲資訊">
      <div class="stat-card">
        <span class="stat-label">分數</span>
        <strong id="score">0</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">剩餘時間</span>
        <strong><span id="time">30</span> 秒</strong>
      </div>
      <div class="stat-card">
        <span class="stat-label">最高分</span>
        <strong id="best-score">0</strong>
      </div>
    </section>

    <section class="difficulty-selector" aria-label="難度選擇">
      <fieldset class="difficulty-group">
        <legend>選擇難度</legend>
        <div class="difficulty-options">
          <label class="difficulty-label">
            <input 
              type="radio" 
              name="difficulty" 
              value="easy" 
              class="difficulty-input"
              aria-label="簡單難度"
            >
            <span class="difficulty-name">簡單</span>
            <span class="difficulty-desc">45秒</span>
          </label>
          <label class="difficulty-label">
            <input 
              type="radio" 
              name="difficulty" 
              value="medium" 
              class="difficulty-input"
              checked
              aria-label="普通難度"
            >
            <span class="difficulty-name">普通</span>
            <span class="difficulty-desc">30秒</span>
          </label>
          <label class="difficulty-label">
            <input 
              type="radio" 
              name="difficulty" 
              value="hard" 
              class="difficulty-input"
              aria-label="困難難度"
            >
            <span class="difficulty-name">困難</span>
            <span class="difficulty-desc">20秒</span>
          </label>
        </div>
      </fieldset>
    </section>

    <section class="controls" aria-label="遊戲控制">
      <button id="start-btn" class="btn btn-primary" type="button">開始遊戲</button>
      <button id="restart-btn" class="btn btn-secondary" type="button" disabled>重新開始</button>
    </section>

    <section class="arena" aria-label="打地鼠遊戲區">
      <div id="grid" class="grid" role="grid"></div>
    </section>

    <p id="message" class="message" aria-live="polite">按下「開始遊戲」後，地鼠會隨機出現。</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
